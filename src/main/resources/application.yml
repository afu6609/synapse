server:
  port: 23456

spring:
  application:
    name: embedding-service
  threads:
    virtual:
      enabled: true

# Embedding服务配置
embedding:
  # 分块配置
  chunk:
    enabled: true
    max-length: 512

  # 滑动窗口配置
  sliding-window:
    size: 2
    separator: "\n---\n"

  # 存储配置
  storage:
    base-path: ./data/embedding-service
    vector-file-suffix: .vec

  # 记忆关联图配置
  graph:
    enabled: true
    decay-factor: 0.95
    prune-threshold: 0.01
    query-threshold: 0.5
    max-graph-results: 5
    decay-cron: "0 0 3 * * *"

  # Provider 和 Rerank 通过运行时 API 配置:
  #   provider.type / provider.baseUrl / provider.model / provider.apiKey
  #   rerank.type / rerank.baseUrl / rerank.model / rerank.apiKey

  # 管理后台配置
  admin:
    password: ""  # 为空则无需密码
